<html>
<head>
<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
<a-scene>
  <a-assets>
    <a-asset-item id="store" src="assets/old_japanese_store.glb"></a-asset-item>
    <a-asset-item id="tree" src="assets/bananatree.glb"></a-asset-item>
  </a-assets>
  <a-box color="blue" position="0 0.5 -4"></a-box>
  <a-cylinder color="green" position="-2 0.5 -7"></a-cylinder>
  <a-plane width="50" height="100" color="#d6fa9d" rotation="-90 0 0"></a-plane>
  <a-sky src="assets/skytexture.jpg"></a-sky>
  <a-entity light="type:directional; castShadow:true;" position="1 1 1"></a-entity>
  <a-gltf-model src="assets/bananatree.glb" shadow="receive: true"></a-gltf-model>

  <a-gltf-model src="#tree"></a-gltf-model>
</a-scene>
